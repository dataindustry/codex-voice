<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">退出並卸載模型截圖說明</title>
  <desc id="desc">退出確認對話框的繁體中文示意截圖。</desc>
  <rect width="960" height="540" fill="#2a2a2a"/>
  <rect x="220" y="112" width="520" height="316" rx="18" fill="#f5f5f7" stroke="#d0d0d5" stroke-width="2"/>
  <text x="260" y="168" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="27" font-weight="800">退出 Codex Voice Agent？</text>
  <text x="260" y="216" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="600">目前 Ollama 已載入模型：</text>
  <text x="284" y="252" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">• qwen3.6:35b-a3b</text>
  <text x="260" y="304" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">是否在退出 Agent 前同時卸載這些模型以釋放記憶體？</text>
  <rect x="260" y="352" width="150" height="38" rx="9" fill="#2f86ff"/>
  <rect x="424" y="352" width="116" height="38" rx="9" fill="#e5e5ea"/>
  <rect x="554" y="352" width="88" height="38" rx="9" fill="#e5e5ea"/>
  <text x="279" y="377" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">退出並卸載模型</text>
  <text x="456" y="377" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">僅退出</text>
  <text x="582" y="377" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">取消</text>
  <text x="220" y="466" fill="#d5d5d7" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">卸載只釋放記憶體，不刪除本機模型檔案。</text>
</svg>
