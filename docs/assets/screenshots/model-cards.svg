<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Codex Voice model cards screenshot guide</title>
  <desc id="desc">A schematic screenshot guide for model cards and unload controls.</desc>
  <rect width="960" height="540" rx="28" fill="#181818"/>
  <text x="52" y="70" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">模型卡片说明</text>
  <text x="52" y="106" fill="#bfbfbf" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">同一组卡片等高，高度来自内容测量；已加载模型显示卸载按钮。</text>
  <rect x="52" y="150" width="398" height="230" rx="16" fill="#202020" stroke="#2f86ff" stroke-width="3"/>
  <text x="82" y="196" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">Ollama</text>
  <text x="82" y="234" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">qwen3.6:35b-a3b</text>
  <text x="82" y="282" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">参数    35B</text>
  <text x="82" y="316" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">架构    qwen3</text>
  <text x="82" y="350" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">厂商    Ollama</text>
  <circle cx="410" cy="188" r="17" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
  <path d="M402 180 L418 196 M418 180 L402 196" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
  <text x="374" y="132" fill="#ffb3b3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">卸载已加载模型</text>
  <path d="M406 139 L410 166" stroke="#ffb3b3" stroke-width="2"/>
  <rect x="510" y="150" width="398" height="230" rx="16" fill="#202020" stroke="#3f3f3f" stroke-width="2"/>
  <text x="540" y="196" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">内置</text>
  <text x="540" y="234" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">规则纠错（不使用 LLM）</text>
  <text x="540" y="282" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">参数    -</text>
  <text x="540" y="316" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">架构    deterministic</text>
  <text x="540" y="350" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19">厂商    Codex Voice</text>
  <rect x="52" y="420" width="856" height="58" rx="12" fill="#242424" stroke="#464646" stroke-width="2"/>
  <text x="78" y="456" fill="#e8e8e8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">卡片展示来源、名称、参数、架构和厂商；加载中会叠加进度状态。</text>
</svg>
