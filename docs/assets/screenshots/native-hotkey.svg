<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Native hotkey screenshot guide</title>
  <desc id="desc">A schematic screenshot guide for Codex Voice native hotkey settings.</desc>
  <rect width="960" height="540" rx="28" fill="#f5f5f7"/>
  <rect x="48" y="48" width="864" height="444" rx="20" fill="#ffffff" stroke="#d2d2d7" stroke-width="2"/>
  <text x="82" y="96" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">Native Hotkey</text>
  <rect x="82" y="124" width="796" height="48" rx="10" fill="#f0f0f4"/>
  <text x="108" y="155" fill="#4a4a4f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Menu bar panel: Settings -> Hotkey</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="82" y="208" width="796" height="58" rx="12" fill="#fafafa" stroke="#dedee3"/>
    <text x="108" y="244" fill="#1d1d1f" font-size="21" font-weight="700">Current Hotkey</text>
    <text x="700" y="244" fill="#6e6e73" font-size="18">Option + Space</text>
    <rect x="82" y="278" width="796" height="58" rx="12" fill="#fafafa" stroke="#dedee3"/>
    <text x="108" y="314" fill="#1d1d1f" font-size="21" font-weight="700">Record New Hotkey</text>
    <text x="700" y="314" fill="#6e6e73" font-size="18">click record</text>
    <rect x="82" y="348" width="796" height="58" rx="12" fill="#fafafa" stroke="#dedee3"/>
    <text x="108" y="384" fill="#1d1d1f" font-size="21" font-weight="700">Clear Hotkey</text>
    <text x="700" y="384" fill="#6e6e73" font-size="18">disable</text>
    <rect x="82" y="418" width="796" height="58" rx="12" fill="#fafafa" stroke="#dedee3"/>
    <text x="108" y="454" fill="#1d1d1f" font-size="21" font-weight="700">Restore Default</text>
    <text x="700" y="454" fill="#6e6e73" font-size="18">Option + Space</text>
  </g>
  <circle cx="56" cy="148" r="14" fill="#2f86ff"/>
  <text x="51" y="154" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">1</text>
  <circle cx="56" cy="236" r="14" fill="#2f86ff"/>
  <text x="51" y="242" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">2</text>
</svg>
