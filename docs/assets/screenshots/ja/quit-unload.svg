<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">終了時モデルアンロードのスクリーンショット説明</title>
  <desc id="desc">終了確認ダイアログの日本語 UI 説明用スクリーンショット。</desc>
  <rect width="960" height="540" fill="#2a2a2a"/>
  <rect x="220" y="112" width="560" height="316" rx="18" fill="#f5f5f7" stroke="#d0d0d5" stroke-width="2"/>
  <text x="260" y="168" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="27" font-weight="800">Codex Voice Agent を終了しますか？</text>
  <text x="260" y="216" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="600">現在 Ollama にロード済みのモデル：</text>
  <text x="284" y="252" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">• qwen3.6:35b-a3b</text>
  <text x="260" y="304" fill="#3a3a3c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">終了前にこれらのモデルをアンロードしてメモリを解放しますか？</text>
  <rect x="260" y="352" width="190" height="38" rx="9" fill="#2f86ff"/>
  <rect x="464" y="352" width="104" height="38" rx="9" fill="#e5e5ea"/>
  <rect x="582" y="352" width="110" height="38" rx="9" fill="#e5e5ea"/>
  <text x="278" y="377" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">アンロードして終了</text>
  <text x="486" y="377" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">終了のみ</text>
  <text x="601" y="377" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">キャンセル</text>
  <text x="220" y="466" fill="#d5d5d7" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">アンロードはメモリだけを解放し、ローカルのモデルファイルは削除しません。</text>
</svg>
