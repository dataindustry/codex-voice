<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Codex Voice モデルカードのスクリーンショット説明</title>
  <desc id="desc">モデルカードとアンロード操作の日本語 UI 説明用スクリーンショット。</desc>
  <rect width="960" height="540" rx="28" fill="#181818"/>
  <text x="52" y="70" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">モデルカード説明</text>
  <text x="52" y="106" fill="#bfbfbf" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">同じグループのカードは等高で、内容から高さを測定します。ロード済みモデルにはアンロードボタンが出ます。</text>
  <rect x="52" y="150" width="398" height="230" rx="16" fill="#202020" stroke="#2f86ff" stroke-width="3"/>
  <text x="82" y="196" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">ローカル MLX</text>
  <text x="82" y="234" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">Qwen3-ASR-1.7B</text>
  <text x="82" y="276" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">種類          音声認識</text>
  <text x="82" y="306" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">パラメータ    1.7B</text>
  <text x="82" y="336" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">構成          Qwen3-ASR</text>
  <text x="82" y="366" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">提供元        MLX Community</text>
  <circle cx="410" cy="188" r="17" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
  <path d="M402 180 L418 196 M418 180 L402 196" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
  <text x="302" y="132" fill="#ffb3b3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">ロード済みモデルをアンロード</text>
  <path d="M406 139 L410 166" stroke="#ffb3b3" stroke-width="2"/>
  <rect x="510" y="150" width="398" height="230" rx="16" fill="#202020" stroke="#3f3f3f" stroke-width="2"/>
  <text x="540" y="196" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">ローカル MLX</text>
  <text x="540" y="234" fill="#f5f5f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">Whisper large-v3-turbo</text>
  <text x="540" y="276" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">種類          音声認識</text>
  <text x="540" y="306" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">パラメータ    809M</text>
  <text x="540" y="336" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">構成          Whisper</text>
  <text x="540" y="366" fill="#bdbdbd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">提供元        MLX Community</text>
  <rect x="52" y="420" width="856" height="58" rx="12" fill="#242424" stroke="#464646" stroke-width="2"/>
  <text x="78" y="456" fill="#e8e8e8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">カードは音声認識と任意のテキスト補正の種類を明示します。</text>
</svg>
